<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#1a2744"/>
  <!-- Gold top border -->
  <rect width="1200" height="8" fill="#b8963e"/>
  <!-- Gold bottom border -->
  <rect y="622" width="1200" height="8" fill="#b8963e"/>
  <!-- Gold left border -->
  <rect width="8" height="630" fill="#b8963e"/>
  <!-- Gold right border -->
  <rect x="1192" width="8" height="630" fill="#b8963e"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(184,150,62,0.08)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(184,150,62,0.08)" stroke-width="1"/>

  <!-- HPCL label -->
  <text x="600" y="148" font-family="Georgia, serif" font-size="22" font-weight="400" fill="rgba(184,150,62,0.75)" text-anchor="middle" letter-spacing="8">HIGHLAND PARK COMMUNITY LEAGUE</text>

  <!-- Gold rule -->
  <rect x="560" y="164" width="80" height="3" fill="#b8963e"/>

  <!-- "Vote" -->
  <text x="600" y="265" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#ffffff" text-anchor="middle">Vote</text>

  <!-- "NO" — gold, italic, underlined -->
  <text x="600" y="385" font-family="Georgia, serif" font-size="148" font-weight="900" font-style="italic" fill="#b8963e" text-anchor="middle" text-decoration="underline">NO</text>

  <!-- Gold rule -->
  <rect x="560" y="407" width="80" height="3" fill="#b8963e"/>

  <!-- "to DART" -->
  <text x="600" y="468" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">to DART</text>

  <!-- Election date -->
  <text x="600" y="530" font-family="Georgia, serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="4">MUNICIPAL ELECTION — MAY 2, 2026</text>

  <!-- notodart.org -->
  <text x="600" y="596" font-family="Georgia, serif" font-size="20" font-weight="400" fill="rgba(184,150,62,0.7)" text-anchor="middle" letter-spacing="2">notodart.org</text>
</svg>
