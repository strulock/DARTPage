<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Blue background -->
  <rect width="1200" height="630" fill="#1a2744"/>
  <!-- Gold border -->
  <rect x="18" y="18" width="1164" height="594" fill="none" stroke="#c9982a" stroke-width="4"/>

  <!-- "VOTE" - white serif italic, top -->
  <text x="600" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="700" font-style="italic" fill="#ffffff" text-anchor="middle" letter-spacing="12">VOTE</text>

  <!-- "NO" - massive gold bold italic underlined sans-serif -->
  <text x="600" y="292" font-family="Arial Black, 'Arial Bold', Helvetica, sans-serif" font-size="220" font-weight="900" font-style="italic" text-decoration="underline" fill="#c9982a" text-anchor="middle" letter-spacing="-4">NO</text>

  <!-- "TO DART" - large white bold sans-serif -->
  <text x="600" y="402" font-family="Arial Black, 'Arial Bold', Helvetica, sans-serif" font-size="88" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">TO DART</text>

  <!-- Gold horizontal rule -->
  <line x1="80" y1="424" x2="1120" y2="424" stroke="#c9982a" stroke-width="4"/>

  <!-- "Say NO to the" -->
  <text x="600" y="466" font-family="Arial Black, 'Arial Bold', Helvetica, sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle">
    Say <tspan text-decoration="underline">NO</tspan> to the
  </text>

  <!-- "$8 Million Single Bus Route" with underlines -->
  <text x="600" y="504" font-family="Arial Black, 'Arial Bold', Helvetica, sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle">
    <tspan text-decoration="underline">$8 Million</tspan> Single Bus Route
  </text>

  <!-- Website URL -->
  <text x="600" y="566" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" font-style="italic" fill="#c9982a" text-anchor="middle" letter-spacing="2">NoToDART.org</text>
</svg>
