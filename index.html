<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote No to DART</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #1a2e4a;
      --gold: #d4982a;
      --white: #ffffff;
      --light-gray: #f7f7f7;
    }

    body {
      font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--light-gray);
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--white);
      border: 4px solid var(--navy);
      max-width: 720px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .tagline {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .headline {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .headline .no {
      font-size: 5rem;
      display: block;
    }

    .headline .to-dart {
      font-size: 3rem;
      display: block;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60%;
      height: 3px;
      background: var(--gold);
      border: none;
      margin: 1.5rem auto;
    }

    .subheading {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--navy);
      line-height: 1.4;
    }

    .subheading strong {
      text-decoration: underline;
      font-weight: 700;
    }

    .disclaimer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #666;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .headline .no { font-size: 3.5rem; }
      .headline .to-dart { font-size: 2rem; }
      .tagline { font-size: 1.2rem; }
      .subheading { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="tagline">Vote</p>
    <h1 class="headline">
      <span class="no">NO</span>
      <span class="to-dart">TO DART</span>
    </h1>
    <hr class="divider">
    <p class="subheading">
      Say <strong>NO</strong> to the<br>
      $8 Million Single Bus Route
    </p>
    <p class="disclaimer">
      Pol. Ad. Paid for by the Highland Park Community League, Ralph Perry-Miller, Treasurer.
    </p>
  </main>
</body>
</html>
